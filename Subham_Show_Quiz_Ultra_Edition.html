<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBHAM SHOW QUIZ - Ultra Edition</title>
<style>
*{box-sizing:border-box}
body{
margin:0;font-family:Arial,sans-serif;color:white;overflow-x:hidden;
background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
}
.stars{position:fixed;inset:0;background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;opacity:.4;animation:drift 30s linear infinite}
@keyframes drift{from{transform:translateY(0)}to{transform:translateY(-200px)}}
.container{max-width:900px;margin:auto;padding:20px;position:relative;z-index:2}
.card{background:rgba(255,255,255,.1);backdrop-filter:blur(8px);padding:20px;border-radius:20px}
h1{text-shadow:0 0 15px cyan}
button{padding:12px 18px;border:none;border-radius:10px;cursor:pointer;margin:6px}
.hidden{display:none}
.progress{height:16px;background:#222;border-radius:20px;overflow:hidden}
.bar{height:100%;width:0%;background:lime}
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px}
.player{padding:12px;margin:8px;border-radius:10px;animation:bounce 2s infinite}
.gold{background:gold;color:black}.silver{background:silver;color:black}.bronze{background:#cd7f32}
@keyframes bounce{50%{transform:translateY(-6px)}}
#confetti{font-size:28px}
</style>
</head>
<body>
<div class="stars"></div>
<div class="container">
<div class="card">
<h1>🎮 SUBHAM SHOW QUIZ 🎮</h1>
<h2>シュバム</h2>
<p>Ultra Edition 🚀</p>

<button onclick="toggleMusic()">🎵 Music ON/OFF</button>
<audio id="music" loop>
<source src="" type="audio/mpeg">
</audio>

<div id="start">
<button onclick="startQuiz()">Start Quiz 🚀</button>
</div>

<div id="quiz" class="hidden">
<div class="progress"><div class="bar" id="bar"></div></div>
<h3 id="progressText"></h3>
<h2 id="question"></h2>
<div id="answers"></div>
<p>🏆 Score: <span id="score">0</span></p>
</div>

<div id="result" class="hidden">
<div id="confetti">🎊🎉✨🎊🎉✨🎊🎉✨</div>
<h1>Congratulations 🎉</h1>
<p id="final"></p>

<h2>🏆 Leaderboard</h2>
<div class="player gold">🥇 Meme King</div>
<div class="player silver">🥈 Pro Player</div>
<div class="player bronze">🥉 Beginner</div>

<h3>Favourite Fruit 🍎</h3><input>
<h3>Favourite Flower 🌹</h3><input>
<h3>Favourite Country 🌏</h3><input>
<h3>Favourite City 🏙️</h3><input>
<h3>Comment 💬</h3><textarea rows="4"></textarea>

<p>📺 KING DYNAMITE</p>
<p>Instagram: @Subham</p>
<button onclick="location.reload()">🔄 Play Again</button>
</div>
</div>
</div>

<script>
const questions=[
["Phone battery 1%?",
["Dance","Panic","Sleep","Throw"],1],
["Free Pizza ya Internet?",
["Pizza","Internet","Dono","None"],2],
["Exam ke pehle?",
["Study","Notes","Game","Sleep"],1],
["Strongest survivor?",
["Lion","Tiger","Cockroach","Dragon"],2],
["Meme dekhkar?",
["Timepass","Study","Run","Gym"],0],
["Best snack?",
["Chips","Pizza","Burger","All"],3],
["Holiday plan?",
["Sleep","Travel","Game","All"],3],
["Morning alarm?",
["Wake","Snooze","Run","Dance"],1],
["Funny friend?",
["You","Me","Both","Unknown"],2],
["Coding error?",
["Cry","Debug","Sleep","Restart"],1]
];
let current=0,score=0;
function startQuiz(){
start.classList.add('hidden');
quiz.classList.remove('hidden');
showQ();
}
function showQ(){
let q=questions[current];
progressText.innerText=`Question ${current+1}/${questions.length}`;
bar.style.width=((current)/questions.length*100)+'%';
question.innerText=q[0];
answers.innerHTML='';
q[1].forEach((t,i)=>{
let b=document.createElement('button');
b.textContent=t;
b.onclick=()=>check(i);
answers.appendChild(b);
});
}
function check(i){
if(i===questions[current][2]) score++;
document.getElementById('score').textContent=score;
current++;
if(current<questions.length) showQ();
else finish();
}
function finish(){
quiz.classList.add('hidden');
result.classList.remove('hidden');
let rank=score===questions.length?'👑 Meme King':score>=6?'😎 Pro Player':'😂 Beginner';
final.innerHTML=`Score: ${score}/${questions.length}<br>${rank}`;
bar.style.width='100%';
}
function toggleMusic(){
const m=document.getElementById('music');
if(m.paused){m.play().catch(()=>{});} else {m.pause();}
}
</script>
</body>
</html>
